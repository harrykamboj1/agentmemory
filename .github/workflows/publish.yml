name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      packages:
        description: "Packages to publish (comma-separated: agentmemory,mcp,fs-watcher)"
        required: false
        default: "agentmemory,mcp,fs-watcher"

# Workflow-level permissions stay minimal — only `contents: read`
# is required to check out the repo. Write scopes (`id-token: write`
# for npm provenance, `packages: write` for the GH Packages mirror)
# are granted per-job below so neither job inherits a scope it
# doesn't need.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # `id-token: write` is required for npm publish --provenance to
    # mint a Sigstore OIDC token on this run. Scoped to this job only
    # so the GH Packages mirror job doesn't inherit it.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Don't persist the GITHUB_TOKEN to .git/config — the
          # publish steps don't push back to the repo, so the token
          # only needs to live in memory for this checkout.
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Two-step install: generate a lockfile in-runner with
      # --package-lock-only, then install from it with `npm ci`. Gives a
      # single deterministic dep graph across build / test / publish
      # within one job — important because publish uses `--provenance`.
      # Lockfiles are gitignored at the repo level.
      - run: npm install --package-lock-only --legacy-peer-deps --no-audit --no-fund
      - run: npm ci --legacy-peer-deps --no-audit --no-fund
      - run: npm run build
      - run: npm test

      - name: Publish @agentmemory/agentmemory
        run: |
          if npm view "@agentmemory/agentmemory@$(node -p "require('./package.json').version")" version >/dev/null 2>&1; then
            echo "Version already published, skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm registry propagation
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for i in $(seq 1 24); do
            if npm view "@agentmemory/agentmemory@$VERSION" version >/dev/null 2>&1; then
              echo "Registry propagated after ${i} attempt(s)"
              exit 0
            fi
            echo "Attempt $i: not yet available, sleeping 5s..."
            sleep 5
          done
          echo "ERROR: registry never propagated after 2 minutes" >&2
          exit 1

      - name: Publish @agentmemory/mcp shim
        working-directory: packages/mcp
        run: |
          SHIM_VERSION=$(node -p "require('./package.json').version")
          if npm view "@agentmemory/mcp@$SHIM_VERSION" version >/dev/null 2>&1; then
            echo "Shim version already published, skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for @agentmemory/mcp registry propagation
        working-directory: packages/mcp
        run: |
          SHIM_VERSION=$(node -p "require('./package.json').version")
          for i in $(seq 1 24); do
            if npm view "@agentmemory/mcp@$SHIM_VERSION" version >/dev/null 2>&1; then
              echo "Shim propagated after ${i} attempt(s)"
              exit 0
            fi
            echo "Attempt $i: not yet available, sleeping 5s..."
            sleep 5
          done
          echo "ERROR: shim never propagated after 2 minutes" >&2
          exit 1

      - name: Publish @agentmemory/fs-watcher connector
        working-directory: integrations/filesystem-watcher
        run: |
          FSW_VERSION=$(node -p "require('./package.json').version")
          if npm view "@agentmemory/fs-watcher@$FSW_VERSION" version >/dev/null 2>&1; then
            echo "fs-watcher version already published, skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for @agentmemory/fs-watcher registry propagation
        working-directory: integrations/filesystem-watcher
        run: |
          FSW_VERSION=$(node -p "require('./package.json').version")
          for i in $(seq 1 24); do
            if npm view "@agentmemory/fs-watcher@$FSW_VERSION" version >/dev/null 2>&1; then
              echo "fs-watcher propagated after ${i} attempt(s)"
              exit 0
            fi
            echo "Attempt $i: not yet available, sleeping 5s..."
            sleep 5
          done
          echo "ERROR: fs-watcher never propagated after 2 minutes" >&2
          exit 1

  publish-github-packages:
    # Mirror the same artifacts to GitHub Packages so the repo's
    # right-sidebar "Packages" widget surfaces them. Scoped to
    # @rohitg00 since GH Packages requires the org/user to match the
    # repo owner. Public npm registry remains the canonical install
    # source; this is purely a discovery surface on the repo page.
    needs: publish
    runs-on: ubuntu-latest
    # `packages: write` only here — the public-npm publish job
    # doesn't need it. `contents: read` for the checkout.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Same posture as the publish job — no push back to the
          # repo, so don't persist the token to `.git/config`.
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@rohitg00"

      - run: npm install --package-lock-only --legacy-peer-deps --no-audit --no-fund
      - run: npm ci --legacy-peer-deps --no-audit --no-fund
      - run: npm run build

      - name: Publish @rohitg00/agentmemory to GitHub Packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Save original package.json, rewrite scope for GH Packages,
          # publish, restore. Avoids a permanent scope change in main.
          cp package.json package.json.bak
          node -e "const p=require('./package.json');p.name='@rohitg00/agentmemory';p.publishConfig={registry:'https://npm.pkg.github.com'};require('fs').writeFileSync('package.json',JSON.stringify(p,null,2));"
          if npm view "@rohitg00/agentmemory@$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "GH Packages version already published, skipping"
          else
            npm publish --access public || echo "GH Packages publish failed (non-fatal)"
          fi
          mv package.json.bak package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
